<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dyscalculia Tutor Game - Premium Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5', // Indigo
                        secondary: '#10B981', // Emerald
                        accent: '#F59E0B', // Amber
                        background: '#F8FAFC',
                        surface: '#FFFFFF',
                        error: '#EF4444',
                        success: '#22C55E',
                        darkText: '#1E293B'
                    },
                    fontFamily: {
                        display: ['Outfit', 'sans-serif'],
                        body: ['Open Sans', 'sans-serif'],
                    },
                    boxShadow: {
                        'premium': '0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1)',
                        'inner-thick': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.06)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F1F5F9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 40px 40px;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .number-dot {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .number-dot:hover {
            transform: scale(1.1);
        }

        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-btn:active {
            transform: scale(0.95);
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .animate-bounce-in { animation: bounceIn 0.6s ease-out forwards; }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        /* Improved legibility for dyscalculia: specific letter spacing and line height */
        .dys-text {
            letter-spacing: 0.02em;
            line-height: 1.7;
        }
        
        .number-prominent {
            font-size: 3.5rem;
            font-weight: 800;
            color: #1E293B;
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="font-body text-darkText min-h-screen flex flex-col items-center py-6 px-4">

    <!-- Application Container -->
    <div id="app-container" class="w-full max-w-3xl glass-card rounded-3xl shadow-premium overflow-hidden flex flex-col">
        
        <!-- Header -->
        <header class="bg-primary p-8 text-center text-white relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full opacity-10">
                <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="w-full h-full">
                    <path d="M0 100 C 20 0 50 0 100 100 Z" fill="white"></path>
                </svg>
            </div>
            <h1 class="font-display text-4xl md:text-5xl font-extrabold tracking-tight relative z-10 drop-shadow-md">
                Math Buddy
            </h1>
            <p class="mt-2 font-medium opacity-90 relative z-10">Your friendly math adventure</p>
        </header>

        <!-- Navigation -->
        <nav id="module-nav" class="bg-slate-50 p-4 border-b border-slate-200 flex flex-wrap justify-center gap-3">
            <button id="nav-match" class="px-6 py-3 bg-white border-2 border-primary text-primary font-bold rounded-xl hover:bg-primary hover:text-white transition-colors shadow-sm active:scale-95 focus:outline-none focus:ring-4 focus:ring-primary/20">
                🔢 Match
            </button>
            <button id="nav-sequence" class="px-6 py-3 bg-white border-2 border-emerald-500 text-emerald-600 font-bold rounded-xl hover:bg-emerald-500 hover:text-white transition-colors shadow-sm active:scale-95 focus:outline-none focus:ring-4 focus:ring-emerald-500/20">
                📈 Sequence
            </button>
            <button id="nav-arithmetic" class="px-6 py-3 bg-white border-2 border-amber-500 text-amber-600 font-bold rounded-xl hover:bg-amber-500 hover:text-white transition-colors shadow-sm active:scale-95 focus:outline-none focus:ring-4 focus:ring-amber-500/20">
                ➕ Arithmetic
            </button>
        </nav>

        <!-- Main Game Area -->
        <main id="game-area" class="flex-grow p-8 flex flex-col items-center justify-center min-h-[400px]" aria-live="polite">
            
            <!-- Module Intro -->
            <div id="module-intro" class="w-full max-w-lg bg-blue-50 border-2 border-blue-200 rounded-2xl p-8 text-center animate-bounce-in">
                <h2 class="font-display text-3xl font-bold text-primary mb-4">Welcome to Math Buddy!</h2>
                <p class="dys-text text-lg text-slate-700 mb-6">
                    Ready to practice? Choose a module from the top to start playing. We'll help you see numbers in a whole new way!
                </p>
                <div class="flex justify-center space-x-2">
                    <div class="number-dot scale-75"></div>
                    <div class="number-dot scale-75"></div>
                    <div class="number-dot scale-75"></div>
                </div>
            </div>

            <!-- Question Container -->
            <div id="question-container" class="w-full hidden flex flex-col items-center">
                <p class="question-text font-display text-2xl md:text-3xl font-bold text-center mb-8 text-slate-800"></p>
                
                <!-- Dot Visualizer -->
                <div class="number-dots-container flex flex-wrap justify-center gap-4 mb-10 min-h-[120px]" aria-label="Visual representation of number"></div>

                <!-- Sequence Area -->
                <div id="sequence-display" class="flex flex-wrap justify-center gap-4 mb-10"></div>

                <!-- Multiple Choice Container -->
                <div class="options-container grid grid-cols-2 gap-4 w-full max-w-md hidden"></div>

                <!-- Input Field Container -->
                <div class="input-container w-full max-w-xs hidden">
                    <label for="answer-input" class="sr-only">Enter your answer</label>
                    <input type="number" id="answer-input" 
                           class="w-full p-6 text-center text-4xl font-extrabold border-4 border-slate-200 rounded-2xl focus:border-primary focus:ring-0 transition-all shadow-inner-thick outline-none" 
                           placeholder="?" aria-label="Enter your answer">
                    
                    <button id="submit-answer" class="w-full mt-6 py-4 bg-primary text-white text-xl font-bold rounded-2xl shadow-lg hover:bg-indigo-700 transition-all active:scale-95">
                        SUBMIT ANSWER
                    </button>
                </div>
            </div>

            <!-- Feedback Area -->
            <div id="feedback-area" role="status" aria-atomic="true" class="mt-8 text-2xl font-bold h-12 flex items-center justify-center"></div>
        </main>

        <!-- Score Footer -->
        <div id="score-area" class="hidden bg-slate-50 border-t border-slate-200 p-4 text-center">
            <p class="text-xl font-bold text-slate-600">
                Score: <span id="current-score" class="text-primary">0</span> / <span id="total-questions" class="text-slate-400">0</span>
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const navMatchBtn = document.getElementById('nav-match');
            const navSequenceBtn = document.getElementById('nav-sequence');
            const navArithmeticBtn = document.getElementById('nav-arithmetic');
            const gameArea = document.getElementById('game-area');
            const moduleIntro = document.getElementById('module-intro');
            const questionContainer = document.getElementById('question-container');
            const questionText = document.querySelector('.question-text');
            const dotsContainer = document.querySelector('.number-dots-container');
            const sequenceDisplay = document.getElementById('sequence-display');
            const optionsContainer = document.querySelector('.options-container');
            const inputContainer = document.querySelector('.input-container');
            const answerInput = document.getElementById('answer-input');
            const submitAnswerBtn = document.getElementById('submit-answer');
            const feedbackArea = document.getElementById('feedback-area');
            const scoreArea = document.getElementById('score-area');
            const currentScoreSpan = document.getElementById('current-score');
            const totalQuestionsSpan = document.getElementById('total-questions');

            // State
            let currentModule = '';
            let score = 0;
            let questionCount = 0;
            const maxQuestionsPerModule = 5;
            let correctAnswer = null;
            let currentQuestionType = ''; // 'multichoice' or 'input'

            // Utility Functions
            const hideAllQuestionElements = () => {
                dotsContainer.innerHTML = '';
                dotsContainer.classList.add('hidden');
                sequenceDisplay.innerHTML = '';
                sequenceDisplay.classList.add('hidden');
                optionsContainer.innerHTML = '';
                optionsContainer.classList.add('hidden');
                inputContainer.classList.add('hidden');
                feedbackArea.textContent = '';
                feedbackArea.className = 'mt-8 text-2xl font-bold h-12 flex items-center justify-center';
                answerInput.value = '';
            };

            const showQuestionElements = () => {
                moduleIntro.classList.add('hidden');
                questionContainer.classList.remove('hidden');
                scoreArea.classList.remove('hidden');
            };

            const updateScoreDisplay = () => {
                currentScoreSpan.textContent = score;
                totalQuestionsSpan.textContent = questionCount;
            };

            const getRandomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

            const shuffleArray = (array) => {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            };

            const generateDots = (number) => {
                dotsContainer.innerHTML = '';
                dotsContainer.classList.remove('hidden');
                for (let i = 0; i < number; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'number-dot';
                    dotsContainer.appendChild(dot);
                }
            };

            const showFeedback = (isCorrect, message) => {
                feedbackArea.textContent = message;
                feedbackArea.className = 'mt-8 text-2xl font-bold h-12 flex items-center justify-center ' + 
                                       (isCorrect ? 'text-success animate-bounce-in' : 'text-error animate-shake');
            };

            // Module Loaders
            const loadModule = (moduleName) => {
                currentModule = moduleName;
                score = 0;
                questionCount = 0;
                showQuestionElements();
                generateQuestion();
            };

            const generateQuestion = () => {
                if (questionCount >= maxQuestionsPerModule) {
                    showModuleCompletion();
                    return;
                }

                questionCount++;
                hideAllQuestionElements();
                updateScoreDisplay();

                if (currentModule === 'match') {
                    generateNumberMatchQuestion();
                } else if (currentModule === 'sequence') {
                    generateNumberSequenceQuestion();
                } else if (currentModule === 'arithmetic') {
                    generateBasicArithmeticQuestion();
                }
            };

            // Game Logic
            const generateNumberMatchQuestion = () => {
                currentQuestionType = 'multichoice';
                const targetNumber = getRandomInt(1, 10);
                correctAnswer = targetNumber;
                
                questionText.textContent = "How many dots do you see?";
                generateDots(targetNumber);

                const options = new Set([targetNumber]);
                while (options.size < 4) {
                    options.add(getRandomInt(1, 12));
                }
                
                optionsContainer.classList.remove('hidden');
                optionsContainer.classList.add('grid');
                shuffleArray(Array.from(options)).forEach(num => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn p-6 bg-white border-4 border-slate-200 rounded-2xl text-3xl font-extrabold hover:border-primary hover:text-primary transition-all shadow-sm";
                    btn.textContent = num;
                    btn.onclick = () => checkAnswer(num);
                    optionsContainer.appendChild(btn);
                });
            };

            const generateNumberSequenceQuestion = () => {
                currentQuestionType = 'input';
                const start = getRandomInt(1, 10);
                const step = getRandomInt(1, 3);
                const sequence = [start, start + step, start + (step * 2), start + (step * 3)];
                const blankIndex = getRandomInt(1, 3);
                correctAnswer = sequence[blankIndex];
                
                questionText.textContent = "What number comes next in the sequence?";
                sequenceDisplay.classList.remove('hidden');
                
                sequence.forEach((num, idx) => {
                    const box = document.createElement('div');
                    box.className = "w-20 h-20 flex items-center justify-center text-3xl font-extrabold rounded-2xl border-4 " + 
                                   (idx === blankIndex ? "border-dashed border-slate-400 bg-slate-50 text-slate-300" : "border-emerald-200 bg-emerald-50 text-emerald-700");
                    box.textContent = idx === blankIndex ? "?" : num;
                    sequenceDisplay.appendChild(box);
                });

                inputContainer.classList.remove('hidden');
                answerInput.focus();
            };

            const generateBasicArithmeticQuestion = () => {
                currentQuestionType = 'input';
                const isAddition = Math.random() > 0.5;
                let a, b, sign;

                if (isAddition) {
                    a = getRandomInt(1, 10);
                    b = getRandomInt(1, 10);
                    correctAnswer = a + b;
                    sign = "+";
                } else {
                    a = getRandomInt(5, 15);
                    b = getRandomInt(1, a);
                    correctAnswer = a - b;
                    sign = "-";
                }

                questionText.innerHTML = `<span class="number-prominent">${a}</span> <span class="text-4xl mx-4 text-amber-500">${sign}</span> <span class="number-prominent">${b}</span> <span class="text-4xl mx-4 text-slate-400">=</span> <span class="number-prominent text-primary">?</span>`;
                inputContainer.classList.remove('hidden');
                answerInput.focus();
            };

            const checkAnswer = (userInput) => {
                const isCorrect = parseInt(userInput) === correctAnswer;
                
                if (isCorrect) {
                    score++;
                    showFeedback(true, "✨ Fantastic Job!");
                } else {
                    showFeedback(false, `Keep trying! It was ${correctAnswer}`);
                }

                updateScoreDisplay();
                
                // Disable inputs during feedback
                if (currentQuestionType === 'multichoice') {
                    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                } else {
                    submitAnswerBtn.disabled = true;
                    answerInput.disabled = true;
                }

                setTimeout(() => {
                    submitAnswerBtn.disabled = false;
                    answerInput.disabled = false;
                    generateQuestion();
                }, 1500);
            };

            const showModuleCompletion = () => {
                hideAllQuestionElements();
                questionContainer.classList.add('hidden');
                moduleIntro.classList.remove('hidden');
                moduleIntro.innerHTML = `
                    <h2 class="font-display text-4xl font-extrabold text-primary mb-4">Module Complete!</h2>
                    <div class="text-6xl mb-6">🏆</div>
                    <p class="dys-text text-2xl text-slate-700 mb-8">
                        You scored <span class="text-primary font-bold">${score}</span> out of ${maxQuestionsPerModule}!
                    </p>
                    <button onclick="location.reload()" class="px-8 py-4 bg-primary text-white text-xl font-bold rounded-2xl shadow-lg hover:bg-indigo-700 transition-all active:scale-95">
                        PLAY AGAIN
                    </button>
                `;
            };

            // Events
            navMatchBtn.onclick = () => loadModule('match');
            navSequenceBtn.onclick = () => loadModule('sequence');
            navArithmeticBtn.onclick = () => loadModule('arithmetic');

            submitAnswerBtn.onclick = () => {
                if (answerInput.value !== '') {
                    checkAnswer(answerInput.value);
                }
            };

            answerInput.onkeypress = (e) => {
                if (e.key === 'Enter' && answerInput.value !== '') {
                    checkAnswer(answerInput.value);
                }
            };
        });
    </script>
</body>
</html>
